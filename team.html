<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKA HOST - Team</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="main-container">
        <section class="active-section">
            
            <div class="glass-panel" style="margin-bottom: 30px;">
                <h2><i class="fas fa-crown" style="color: #ffcc00;"></i> Core Team</h2>
                <div class="team-grid mt-20">
                    
                    <div class="member-card" style="border-color: #ffaa00; box-shadow: 0 0 15px rgba(255,170,0,0.1);">
                        <img src="ttttttttttttttttttttttttttttt.png" alt="SDGAMER">
                        <h3 style="color: #fff;">SDGAMER</h3>
                        <span class="badge" style="background: rgba(255, 170, 0, 0.2); color: #ffaa00; padding: 4px 8px; font-size: 0.7rem; margin-top: 8px;">OWNER</span>
                        <p style="color: #aaa; font-size: 0.85rem; margin-top: 8px;">Lead Developer</p>
                    </div>

                    <div class="member-card" style="border-color: #00d2ff; box-shadow: 0 0 15px rgba(0,210,255,0.1);">
                        <img src="https://cdn-icons-png.flaticon.com/512/2922/2922510.png" alt="You">
                        <h3 style="color: #fff;">You</h3>
                        <span class="badge" style="background: rgba(0, 210, 255, 0.2); color: #00d2ff; padding: 4px 8px; font-size: 0.7rem; margin-top: 8px;">DEVELOPER</span>
                        <p style="color: #aaa; font-size: 0.85rem; margin-top: 8px;">Full Stack Dev</p>
                    </div>

                    <div class="member-card" style="border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.1);">
                        <img src="https://cdn-icons-png.flaticon.com/512/2922/2922561.png" alt="Deadishere">
                        <h3 style="color: #fff;">Deadishere</h3>
                        <span class="badge" style="background: rgba(0, 255, 136, 0.2); color: #00ff88; padding: 4px 8px; font-size: 0.7rem; margin-top: 8px;">MC DEV</span>
                        <p style="color: #aaa; font-size: 0.85rem; margin-top: 8px;">Minecraft Developer</p>
                    </div>

                    <div class="member-card" style="border-color: #ff32ff; box-shadow: 0 0 15px rgba(255,50,255,0.1);">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Miss Riya">
                        <h3 style="color: #fff;">Miss Riya</h3>
                        <span class="badge" style="background: rgba(255, 50, 255, 0.2); color: #ff32ff; padding: 4px 8px; font-size: 0.7rem; margin-top: 8px;">DB MANAGER</span>
                        <p style="color: #aaa; font-size: 0.85rem; margin-top: 8px;">SRV DB Manager</p>
                    </div>

                    <div class="member-card" style="border-color: #ffcc00; box-shadow: 0 0 15px rgba(255,204,0,0.1);">
                        <img src="https://cdn-icons-png.flaticon.com/512/2922/2922510.png" alt="Kabeer">
                        <h3 style="color: #fff;">Kabeer</h3>
                        <span class="badge" style="background: rgba(255, 204, 0, 0.2); color: #ffcc00; padding: 4px 8px; font-size: 0.7rem; margin-top: 8px;">HOST</span>
                        <p style="color: #aaa; font-size: 0.85rem; margin-top: 8px;">Script Host</p>
                    </div>

                    <div class="member-card" style="border-color: #ff3232; box-shadow: 0 0 15px rgba(255,50,50,0.1);">
                        <img src="https://cdn-icons-png.flaticon.com/512/2922/2922561.png" alt="Aarma">
                        <h3 style="color: #fff;">Aarma</h3>
                        <span class="badge" style="background: rgba(255, 50, 50, 0.2); color: #ff3232; padding: 4px 8px; font-size: 0.7rem; margin-top: 8px;">CODE DEV</span>
                        <p style="color: #aaa; font-size: 0.85rem; margin-top: 8px;">Code Dev</p>
                    </div>

                </div>
            </div>

            <div class="glass-panel">
                <h2><i class="fab fa-discord" style="color: #5865F2;"></i> Discord Community</h2>
                <p style="color: #aaa; font-size: 0.9rem; margin-top: 5px;">Members currently online on the server.</p>
                <div class="team-grid mt-20" id="discord-members"><p>Loading live members...</p></div>
            </div>

        </section>
    </div>

    <script src="script.js?v=4"></script>
</body>
</html>
