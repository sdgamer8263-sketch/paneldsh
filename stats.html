<div class="glass-panel" style="margin-bottom: 25px;">
    <h2 style="margin-bottom: 15px;">Live Analytics</h2>
    <div class="stats-top">
        <div class="stat-card cpu"><h4>CPU</h4><h2 id="cpu-val">28%</h2></div>
        <div class="stat-card ram"><h4>RAM</h4><h2><span id="ram-val">4.9</span><span>GB / 32 GB</span></h2></div>
        <div class="stat-card net"><h4>NETWORK</h4><h2><span id="net-val">90</span><span> Mbps</span></h2></div>
        <div class="stat-card active"><h4>ACTIVE</h4><h2>842 <span style="color:#888; font-size: 0.8rem;">▲ Peak</span></h2></div>
    </div>
    <div class="chart-container"><canvas id="trafficChart"></canvas></div>
</div>
<div class="glass-panel" style="margin-bottom: 25px;">
    <h3 style="margin-bottom: 15px;">Extended Server Metrics</h3>
    <div class="metrics-grid">
        <div class="metric-box"><h5>CORE TEMP</h5><h3 id="m-temp" class="text-danger">38°C</h3></div>
        <div class="metric-box"><h5>DISK READ</h5><h3 id="m-read" class="text-info">32.5 MB/s</h3></div>
        <div class="metric-box"><h5>DISK WRITE</h5><h3 id="m-write" class="text-info">10.4 MB/s</h3></div>
        <div class="metric-box"><h5>DB CONN.</h5><h3 class="text-warning">15</h3></div>
        <div class="metric-box"><h5>API REQ/S</h5><h3 id="m-api" class="text-success">421</h3></div>
        <div class="metric-box"><h5>ERROR RATE</h5><h3 class="text-danger">0.04%</h3></div>
    </div>
</div>
<div class="glass-panel">
    <h4 style="color:#888; margin-bottom:10px; font-family: monospace;">SYSTEM LOGS</h4>
    <div id="sys-logs" class="system-logs"></div>
</div>
