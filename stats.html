<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKA HOST - Stats</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="main-container">
        <section class="active-section">
            <div class="glass-panel">
                <h2><i class="fas fa-chart-line"></i> Live Server Analytics</h2>
                <div class="stats-cards mt-20">
                    <div class="stat-box text-center">
                        <i class="fas fa-microchip" style="font-size: 2rem; color: #00d2ff;"></i>
                        <h4 style="margin-top:10px;">CPU Usage</h4>
                        <h2 id="live-cpu">23%</h2>
                    </div>
                    <div class="stat-box text-center">
                        <i class="fas fa-memory" style="font-size: 2rem; color: #00ff88;"></i>
                        <h4 style="margin-top:10px;">RAM Usage</h4>
                        <h2 id="live-ram">5.9GB <small>/ 32GB</small></h2>
                    </div>
                    <div class="stat-box text-center">
                        <i class="fas fa-network-wired" style="font-size: 2rem; color: #ff3232;"></i>
                        <h4 style="margin-top:10px;">Network</h4>
                        <h2 id="live-net">67 Mbps</h2>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
