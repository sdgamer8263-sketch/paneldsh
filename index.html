<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKA HOST - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@widgetbot/html-embed"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="ttttttttttttttttttttttttttttt.png" alt="Logo" class="logo-img">
            <span>SKA HOST</span>
        </div>
        <ul class="nav-links" id="dynamic-nav"></ul>
        
        <div class="user-profile" onclick="openProfile()">
            <img src="ttttttttttttttttttttttttttttt.png" alt="SDGAMER">
            <div class="user-info">
                <span class="name">SDGAMER</span>
                <span class="role">Owner</span>
            </div>
        </div>
    </nav>

    <div id="profileModal" class="modal-overlay" onclick="closeProfile(event)">
        <div class="modal-content">
            <button class="close-btn" onclick="closeProfile()"><i class="fas fa-times"></i></button>
            <div class="modal-header">
                <img src="ttttttttttttttttttttttttttttt.png" alt="SDGAMER" class="modal-avatar">
                <div class="modal-title">
                    <h3>SDGAMER <span class="badge owner-badge">OWNER</span></h3>
                    <p><span class="status-dot status-dnd"></span> Do Not Disturb</p>
                </div>
            </div>
            <div class="modal-body">
                <div class="playing-status">
                    <p style="font-size: 0.8rem; color: #888; font-weight: bold;">PLAYING</p>
                    <p><i class="fas fa-code" style="color: #007acc;"></i> VS Code</p>
                </div>
                <div class="modal-stats">
                    <div>
                        <span class="label">USER ID</span>
                        <span class="value">1472601008</span>
                    </div>
                    <div>
                        <span class="label">JOINED</span>
                        <span class="value">SKA HOST</span>
                    </div>
                </div>
            </div>
            <button class="modal-close-btn" onclick="closeProfile()">Close Profile</button>
        </div>
    </div>

    <div class="main-container" id="content-area">
        <h2 style="text-align:center; margin-top: 50px;">Loading...</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
