<div class="glass-panel">
    <h2>Command Library</h2>
    <div class="category-filters mt-10">
        <button class="filter-btn active" onclick="filterCategory('ALL', this)">ALL COMMANDS</button>
        <button class="filter-btn" onclick="filterCategory('USEFUL', this)">Useful</button>
        <button class="filter-btn" onclick="filterCategory('LINUX', this)">Linux</button>
        <button class="filter-btn" onclick="filterCategory('VPS', this)">VPS</button>
        <button class="filter-btn" onclick="filterCategory('DOCKER', this)">Docker</button>
        <button class="filter-btn" onclick="filterCategory('GIT', this)">Git</button>
        <button class="filter-btn" onclick="filterCategory('NETWORKING', this)">Networking</button>
        <button class="filter-btn" onclick="filterCategory('SYSTEM', this)">System</button>
        <button class="filter-btn" onclick="filterCategory('AUTO', this)">Auto</button>
    </div>
    <input type="text" id="cmdSearch" placeholder="Search commands..." onkeyup="searchCommands()" class="search-bar">
    <div class="table-container">
        <table class="cmd-table" id="cmdTable">
            <thead><tr><th>CATEGORY</th><th>TITLE</th><th>COMMAND</th><th style="text-align: right;">ACTION</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>
