<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKA HOST - MCPE Addons</title>
    <link rel="stylesheet" href="style.css?v=addon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="main-container">
        <div class="page-header">
            <div class="ph-left">
                <h2>MCPE ADDONS & FILES</h2>
                <p>Direct File Manager</p>
            </div>
            <div class="ph-right">
                <span class="online-badge" style="border-color: #00d2ff; color: #00d2ff; background: rgba(0, 210, 255, 0.1);">
                    <span class="dot" style="background: #00d2ff; box-shadow: 0 0 10px #00d2ff;"></span> CLOUD SYNCED
                </span>
            </div>
        </div>

        <section class="active-section">
            <div class="glass-panel" style="padding: 25px;">
                <h3 style="color: #00ff88; margin-bottom: 20px; border-bottom: 1px solid rgba(0,255,136,0.2); padding-bottom: 10px; display: flex; align-items: center; justify-content: space-between;">
                    <span><i class="fas fa-server"></i> File Explorer</span>
                </h3>
                
                <div id="drive-files-container" style="display: flex; flex-direction: column; gap: 10px;">
                    <p style="color: #aaa; text-align: center; padding: 20px;"><i class="fas fa-spinner fa-spin"></i> Fetching files...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js?v=addon"></script>

    <script>
        // 🚨 APNAR DRIVE FOLDER ID & API KEY
        const ROOT_FOLDER_ID = '13aHOHsX0W9F--CS-5-qBOKGEuDJ3TmRP';
        const API_KEY = 'AIzaSyDtz8_0YElTwMk2geoCQCwYQqN05FlyMPc'; 
        
        // Folder History Tracker (Back ashar jonno)
        let folderStack = [{ id: ROOT_FOLDER_ID, name: 'Root Directory' }];

        async function loadDriveFiles(folderId) {
            const container = document.getElementById('drive-files-container');
            container.innerHTML = '<p style="color: #00d2ff; text-align: center; padding: 20px;"><i class="fas fa-circle-notch fa-spin"></i> Loading Data...</p>';

            // API theke shudhu oi folder er vitorer jinis anbe (Trash bad diye)
            const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,size)&key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if(data.error) {
                    container.innerHTML = `<p style="color: #ff3232; text-align: center;">Error: ${data.error.message}</p>`;
                    return;
                }

                let html = '';

                // ✅ Back Button (Jodi root chara onno folder e thake)
                if (folderStack.length > 1) {
                    const currentFolderName = folderStack[folderStack.length - 1].name;
                    html += `
                    <div style="display: flex; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <button onclick="goBack()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; margin-right: 15px;">
                            <i class="fas fa-arrow-left"></i> BACK
                        </button>
                        <span style="color: #00d2ff; font-weight: bold; font-family: monospace;">/ ${currentFolderName}</span>
                    </div>
                    `;
                } else {
                    html += `<div style="margin-bottom: 15px; color: #00d2ff; font-weight: bold; font-family: monospace;">/ Root Directory</div>`;
                }

                if(!data.files || data.files.length === 0) {
                    container.innerHTML = html + '<p style="color: #888; text-align: center; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 8px;">Folder is empty.</p>';
                    return;
                }

                // ✅ Sort: Folder gulo aage rakhbo, tarpor File gulo
                data.files.sort((a, b) => {
                    const isFolderA = a.mimeType === 'application/vnd.google-apps.folder';
                    const isFolderB = b.mimeType === 'application/vnd.google-apps.folder';
                    if (isFolderA && !isFolderB) return -1;
                    if (!isFolderA && isFolderB) return 1;
                    return a.name.localeCompare(b.name);
                });

                data.files.forEach(file => {
                    const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                    
                    const icon = isFolder ? 'fas fa-folder' : 'fas fa-file-archive';
                    const iconColor = isFolder ? '#00d2ff' : '#00ff88'; 
                    const actionText = isFolder ? 'OPEN' : 'DOWNLOAD';
                    const actionIcon = isFolder ? 'fas fa-folder-open' : 'fas fa-download';
                    
                    const safeName = file.name.replace(/'/g, "\\'"); // Naam er majhe quote thakle error na khawar jonno
                    const fileSize = file.size ? (file.size / 1024 / 1024).toFixed(2) + ' MB' : '';

                    let actionHtml = '';
                    if(isFolder) {
                        // Folder hole website er bhitorei open hobe (Google drive e jabe na)
                        actionHtml = `
                        <button onclick="openFolder('${file.id}', '${safeName}')" style="background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff; color: #00d2ff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;" onmouseover="this.style.background='#00d2ff'; this.style.color='#000';" onmouseout="this.style.background='rgba(0, 210, 255, 0.1)'; this.style.color='#00d2ff';">
                            <i class="${actionIcon}"></i> ${actionText}
                        </button>`;
                    } else {
                        // File hole Direct Download Link hobe
                        actionHtml = `
                        <a href="https://drive.google.com/uc?export=download&id=${file.id}" target="_blank" style="text-decoration: none; background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; color: #00ff88; padding: 8px 15px; border-radius: 6px; font-weight: bold; transition: 0.3s;" onmouseover="this.style.background='#00ff88'; this.style.color='#000';" onmouseout="this.style.background='rgba(0, 255, 136, 0.1)'; this.style.color='#00ff88';">
                            <i class="${actionIcon}"></i> ${actionText}
                        </a>`;
                    }

                    html += `
                    <div style="background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s;" onmouseover="this.style.borderColor='${iconColor}'; this.style.background='rgba(0,0,0,0.8)';" onmouseout="this.style.borderColor='rgba(255,255,255,0.05)'; this.style.background='rgba(0,0,0,0.5)';">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <i class="${icon}" style="font-size: 1.8rem; color: ${iconColor};"></i>
                            <div>
                                <h4 style="color: #fff; margin: 0; font-size: 1rem; text-transform: none;">${file.name}</h4>
                                ${fileSize ? `<span style="color: #888; font-size: 0.75rem; font-weight: bold;">Size: ${fileSize}</span>` : ''}
                            </div>
                        </div>
                        ${actionHtml}
                    </div>
                    `;
                });

                container.innerHTML = html;

            } catch(err) {
                container.innerHTML = '<p style="color: #ff3232; text-align: center;">Network Error! Please try again.</p>';
            }
        }
        
        // Folder er bhitor dhokar function
        function openFolder(id, name) {
            folderStack.push({ id: id, name: name }); // History te save korlam
            loadDriveFiles(id); // Notun folder load korlam
        }

        // Back ashar function
        function goBack() {
            if (folderStack.length > 1) {
                folderStack.pop(); // Last folder muche fellam
                const prevFolder = folderStack[folderStack.length - 1]; // Tar ager folder ta nilam
                loadDriveFiles(prevFolder.id); // Setake abar load korlam
            }
        }

        // Prothom bar root folder theke start hobe
        loadDriveFiles(folderStack[0].id);
    </script>
</body>
</html>
