<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKA HOST - MCPE Addons</title>
    <link rel="stylesheet" href="style.css?v=addon-pass">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Security Screen Styles */
        #security-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 300px; text-align: center; animation: popIn 0.3s ease;
        }
        .pass-input {
            width: 100%; max-width: 300px; padding: 12px 15px; border-radius: 6px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88; font-size: 1.1rem; text-align: center; margin-bottom: 15px;
            font-family: monospace; outline: none; transition: 0.3s; letter-spacing: 2px;
        }
        .pass-input:focus { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .unlock-btn {
            background: #00ff88; color: #000; border: none; padding: 12px 30px;
            font-weight: bold; font-size: 1rem; border-radius: 6px; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;
        }
        .unlock-btn:hover { background: #fff; box-shadow: 0 0 15px #00ff88; }
        .error-msg { color: #ff3232; font-size: 0.9rem; margin-top: 10px; display: none; font-weight: bold; line-height: 1.5; }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="main-container">
        <div class="page-header">
            <div class="ph-left">
                <h2>MCPE ADDONS & FILES</h2>
                <p>Direct File Manager - <span style="color:#ff3232;">[RESTRICTED ACCESS]</span></p>
            </div>
            <div class="ph-right">
                <span id="status-badge" class="online-badge" style="border-color: #ff3232; color: #ff3232; background: rgba(255, 50, 50, 0.1);">
                    <span class="dot" style="background: #ff3232; box-shadow: 0 0 10px #ff3232;"></span> LOCKED
                </span>
            </div>
        </div>

        <section class="active-section">
            <div class="glass-panel" style="padding: 25px;">
                <h3 style="color: #00ff88; margin-bottom: 20px; border-bottom: 1px solid rgba(0,255,136,0.2); padding-bottom: 10px; display: flex; align-items: center; justify-content: space-between;">
                    <span><i class="fas fa-server"></i> File Explorer</span>
                    <i id="lock-icon" class="fas fa-lock" style="color: #ff3232;"></i>
                </h3>
                
                <div id="security-screen" style="display: none;">
                    <i id="sec-icon" class="fas fa-shield-alt" style="font-size: 3rem; color: #00d2ff; margin-bottom: 15px;"></i>
                    <h3 id="sec-title" style="color: #fff; margin-bottom: 5px;">AUTHORIZATION REQUIRED</h3>
                    <p id="sec-desc" style="color: #888; font-size: 0.9rem; margin-bottom: 20px;">Please enter the master key to access files.</p>
                    
                    <input type="password" id="pass-input" class="pass-input" placeholder="••••••••••••••" autocomplete="off">
                    <button id="unlock-btn" class="unlock-btn" onclick="checkPassword()"><i class="fas fa-key"></i> UNLOCK</button>
                    <p id="error-msg" class="error-msg"></p>
                </div>

                <div id="drive-files-container" style="display: none; flex-direction: column; gap: 10px;">
                    <p style="color: #aaa; text-align: center; padding: 20px;"><i class="fas fa-spinner fa-spin"></i> Fetching files...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js?v=addon-pass"></script>

    <script>
        // 🚨 APNAR SECURITY PASSWORD
        const MASTER_PASSWORD = 'ai9cU0$pJu4cY_T';

        // Drive Configs
        const ROOT_FOLDER_ID = '13aHOHsX0W9F--CS-5-qBOKGEuDJ3TmRP';
        const API_KEY = 'AIzaSyDtz8_0YElTwMk2geoCQCwYQqN05FlyMPc'; 
        let folderStack = [{ id: ROOT_FOLDER_ID, name: 'Root Directory' }];

        // Time Settings (in milliseconds)
        const LOCK_TIME_MS = 10 * 60 * 1000; // 10 Minutes Lock
        const AUTH_TIME_MS = 24 * 60 * 60 * 1000; // 1 Day Unlocked Session

        let lockoutTimer;

        // 🔒 System Initialize - Page Load hole eta check korbe
        function initSecurity() {
            const now = Date.now();
            const lockExpiry = localStorage.getItem('addon_lock_expiry');
            const authExpiry = localStorage.getItem('addon_auth_expiry');

            // Jodi aage theke locked thake
            if (lockExpiry && now < parseInt(lockExpiry)) {
                startLockoutTimer(parseInt(lockExpiry));
                return;
            }

            // Jodi aage password diye thake (1 din er vetor)
            if (authExpiry && now < parseInt(authExpiry)) {
                unlockSystem();
                return;
            }

            // Kichui na hole normal password screen dekhabe
            document.getElementById('security-screen').style.display = 'flex';
        }

        // 🔒 Password Check Function
        function checkPassword() {
            const inputField = document.getElementById('pass-input');
            const errorMsg = document.getElementById('error-msg');
            const now = Date.now();
            let failedAttempts = parseInt(localStorage.getItem('addon_failed_attempts') || '0');

            if(inputField.value === MASTER_PASSWORD) {
                // Sothik Password: Save Session, Clear Errors
                localStorage.setItem('addon_auth_expiry', now + AUTH_TIME_MS);
                localStorage.removeItem('addon_failed_attempts');
                localStorage.removeItem('addon_lock_expiry');
                unlockSystem();
            } else {
                // Bhul Password: Add Attempt
                failedAttempts++;
                localStorage.setItem('addon_failed_attempts', failedAttempts);
                
                if (failedAttempts >= 3) {
                    // 3 bar bhul, 10 min lock!
                    const expiry = now + LOCK_TIME_MS;
                    localStorage.setItem('addon_lock_expiry', expiry);
                    startLockoutTimer(expiry);
                } else {
                    // Normal bhul message (Koto bar baki dekhabe)
                    let left = 3 - failedAttempts;
                    inputField.classList.add('shake');
                    inputField.style.borderColor = '#ff3232';
                    errorMsg.innerHTML = `ACCESS DENIED. INCORRECT KEY.<br><span style="color:#ffaa00;">(${left} ATTEMPTS LEFT)</span>`;
                    errorMsg.style.display = 'block';
                    inputField.value = '';
                    
                    setTimeout(() => {
                        inputField.classList.remove('shake');
                        inputField.style.borderColor = 'rgba(0, 255, 136, 0.3)';
                    }, 400);
                }
            }
        }

        // ⏱️ Lockout Timer Show Korar Function
        function startLockoutTimer(expiryTime) {
            document.getElementById('security-screen').style.display = 'flex';
            document.getElementById('pass-input').style.display = 'none';
            document.getElementById('unlock-btn').style.display = 'none';
            document.getElementById('sec-icon').className = 'fas fa-ban';
            document.getElementById('sec-icon').style.color = '#ff3232';
            document.getElementById('sec-title').innerText = 'SYSTEM LOCKED';
            document.getElementById('sec-title').style.color = '#ff3232';
            document.getElementById('sec-desc').style.display = 'none';
            
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'block';
            errorMsg.style.fontSize = '1.1rem';
            
            clearInterval(lockoutTimer);
            lockoutTimer = setInterval(() => {
                const now = Date.now();
                const timeLeft = expiryTime - now;
                
                if (timeLeft <= 0) {
                    // Lockout sesh, page reload
                    clearInterval(lockoutTimer);
                    localStorage.removeItem('addon_failed_attempts');
                    localStorage.removeItem('addon_lock_expiry');
                    location.reload(); 
                } else {
                    const minutes = Math.floor(timeLeft / 60000);
                    const seconds = Math.floor((timeLeft % 60000) / 1000);
                    errorMsg.innerHTML = `MULTIPLE FAILED ATTEMPTS DETECTED.<br>TRY AGAIN IN: <span style="color:#fff; font-size:1.5rem;">${minutes}m ${seconds}s</span>`;
                }
            }, 1000);
        }

        // 🔓 System Unlock Korar Function (UI change kore files load korbe)
        function unlockSystem() {
            document.getElementById('security-screen').style.display = 'none';
            document.getElementById('drive-files-container').style.display = 'flex';
            
            const statusBadge = document.getElementById('status-badge');
            statusBadge.innerHTML = '<span class="dot" style="background: #00d2ff; box-shadow: 0 0 10px #00d2ff;"></span> CLOUD SYNCED';
            statusBadge.style.borderColor = '#00d2ff';
            statusBadge.style.color = '#00d2ff';
            statusBadge.style.background = 'rgba(0, 210, 255, 0.1)';
            
            const lockIcon = document.getElementById('lock-icon');
            lockIcon.className = 'fas fa-unlock-alt';
            lockIcon.style.color = '#00ff88';

            loadDriveFiles(folderStack[0].id);
        }

        // Enter key chapleo jeno kaj kore
        document.getElementById("pass-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkPassword();
            }
        });

        // ==========================================
        // 📁 Drive File Fetching Function (Apnar code)
        // ==========================================
        async function loadDriveFiles(folderId) {
            const container = document.getElementById('drive-files-container');
            container.innerHTML = '<p style="color: #00d2ff; text-align: center; padding: 20px;"><i class="fas fa-circle-notch fa-spin"></i> Loading Data...</p>';

            const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,size)&key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if(data.error) {
                    container.innerHTML = `<p style="color: #ff3232; text-align: center;">Error: ${data.error.message}</p>`;
                    return;
                }

                let html = '';

                if (folderStack.length > 1) {
                    const currentFolderName = folderStack[folderStack.length - 1].name;
                    html += `
                    <div style="display: flex; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <button onclick="goBack()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; margin-right: 15px;">
                            <i class="fas fa-arrow-left"></i> BACK
                        </button>
                        <span style="color: #00d2ff; font-weight: bold; font-family: monospace;">/ ${currentFolderName}</span>
                    </div>
                    `;
                } else {
                    html += `<div style="margin-bottom: 15px; color: #00d2ff; font-weight: bold; font-family: monospace;">/ Root Directory</div>`;
                }

                if(!data.files || data.files.length === 0) {
                    container.innerHTML = html + '<p style="color: #888; text-align: center; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 8px;">Folder is empty.</p>';
                    return;
                }

                data.files.sort((a, b) => {
                    const isFolderA = a.mimeType === 'application/vnd.google-apps.folder';
                    const isFolderB = b.mimeType === 'application/vnd.google-apps.folder';
                    if (isFolderA && !isFolderB) return -1;
                    if (!isFolderA && isFolderB) return 1;
                    return a.name.localeCompare(b.name);
                });

                data.files.forEach(file => {
                    const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                    const icon = isFolder ? 'fas fa-folder' : 'fas fa-file-archive';
                    const iconColor = isFolder ? '#00d2ff' : '#00ff88'; 
                    const actionText = isFolder ? 'OPEN' : 'DOWNLOAD';
                    const actionIcon = isFolder ? 'fas fa-folder-open' : 'fas fa-download';
                    const safeName = file.name.replace(/'/g, "\\'"); 
                    const fileSize = file.size ? (file.size / 1024 / 1024).toFixed(2) + ' MB' : '';

                    let actionHtml = '';
                    if(isFolder) {
                        actionHtml = `
                        <button onclick="openFolder('${file.id}', '${safeName}')" style="background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff; color: #00d2ff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;" onmouseover="this.style.background='#00d2ff'; this.style.color='#000';" onmouseout="this.style.background='rgba(0, 210, 255, 0.1)'; this.style.color='#00d2ff';">
                            <i class="${actionIcon}"></i> ${actionText}
                        </button>`;
                    } else {
                        actionHtml = `
                        <a href="https://drive.google.com/uc?export=download&id=${file.id}" target="_blank" style="text-decoration: none; background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; color: #00ff88; padding: 8px 15px; border-radius: 6px; font-weight: bold; transition: 0.3s;" onmouseover="this.style.background='#00ff88'; this.style.color='#000';" onmouseout="this.style.background='rgba(0, 255, 136, 0.1)'; this.style.color='#00ff88';">
                            <i class="${actionIcon}"></i> ${actionText}
                        </a>`;
                    }

                    html += `
                    <div style="background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s;" onmouseover="this.style.borderColor='${iconColor}'; this.style.background='rgba(0,0,0,0.8)';" onmouseout="this.style.borderColor='rgba(255,255,255,0.05)'; this.style.background='rgba(0,0,0,0.5)';">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <i class="${icon}" style="font-size: 1.8rem; color: ${iconColor};"></i>
                            <div>
                                <h4 style="color: #fff; margin: 0; font-size: 1rem; text-transform: none;">${file.name}</h4>
                                ${fileSize ? `<span style="color: #888; font-size: 0.75rem; font-weight: bold;">Size: ${fileSize}</span>` : ''}
                            </div>
                        </div>
                        ${actionHtml}
                    </div>
                    `;
                });

                container.innerHTML = html;

            } catch(err) {
                container.innerHTML = '<p style="color: #ff3232; text-align: center;">Network Error! Please try again.</p>';
            }
        }
        
        function openFolder(id, name) {
            folderStack.push({ id: id, name: name }); 
            loadDriveFiles(id); 
        }

        function goBack() {
            if (folderStack.length > 1) {
                folderStack.pop(); 
                const prevFolder = folderStack[folderStack.length - 1]; 
                loadDriveFiles(prevFolder.id); 
            }
        }

        // Start checking security immediately on load
        window.onload = initSecurity;
    </script>
</body>
</html>
