<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addon Preview - SKA HOST</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { color: #58a6ff; margin: 0; }
        .file-viewer {
            width: 100%;
            max-width: 800px;
            height: 500px;
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .download-section {
            width: 100%;
            max-width: 400px;
        }
        .btn {
            background-color: #238636;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { background-color: #2ea043; }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SKA HOSTING</h1>
        <p>Elemental Weapon & Power Addon File</p>
    </div>

    <div class="file-viewer">
        <iframe id="drivePreview" src=""></iframe>
    </div>

    <div class="download-section">
        <button id="driveDownload" class="btn">Download Now</button>
    </div>

    <div class="footer">
        Powered by SKA HOST (SDGAMER)
    </div>

    <script src="script.js"></script>
</body>
</html>
